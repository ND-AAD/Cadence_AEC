# Render Infrastructure-as-Code
# Two services: backend Web Service, frontend Static Site.
# Database: create manually in Render dashboard, paste connection string into env vars.

services:
  # ─── Backend API ─────────────────────────────────────────────
  - type: web
    name: cadence-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Paste internal connection string from Render Postgres
      - key: DATABASE_URL_SYNC
        sync: false  # Same connection string
      - key: CORS_ORIGINS
        value: "https://cadence-aec.io,https://www.cadence-aec.io,http://localhost:3000"
      - key: JWT_SECRET
        generateValue: true
      - key: ALPHA_INVITE_CODE
        value: "CADENCE-ALPHA"
      - key: DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false  # Manual entry in Render dashboard

  # ─── Frontend Static Site ────────────────────────────────────
  - type: web
    name: cadence-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cadence-api
          property: host
